name: Claude Code Messages
version: "0.1.8"
slug: claude_code_messages
description: Graphical chat interface for the Claude Code CLI, designed for the HA companion app
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
hassio_api: false
ingress: true
ingress_port: 8099
panel_icon: mdi:forum
panel_title: Claude Code Messages
map:
  - config:rw
  - share:rw
  - addons:rw
options:
  CLAUDE_WORKDIR: "/config"
  AUDIT_LOG: "/config/claude-code-messages-audit.log"
  MAX_SESSIONS: 20
  PORT: "8099"
schema:
  CLAUDE_WORKDIR: str
  AUDIT_LOG: str
  MAX_SESSIONS: int
  PORT: str
